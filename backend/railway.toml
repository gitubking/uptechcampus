[build]
buildCommand = "mkdir -p storage/framework/sessions storage/framework/views storage/framework/cache storage/framework/testing storage/logs bootstrap/cache && chmod -R 777 storage bootstrap/cache && COMPOSER_NO_SCRIPTS=1 composer install --no-dev --optimize-autoloader"

[deploy]
startCommand = "php artisan package:discover --ansi && php artisan migrate --force && php artisan config:cache && php artisan route:cache && php artisan view:cache && php -S 0.0.0.0:$PORT -t public"
