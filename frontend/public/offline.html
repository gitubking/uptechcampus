<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#E30613">
    <title>Hors-ligne — UPTECH Campus</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --red: #E30613;
        --red-dark: #b00410;
        --bg: #111111;
        --surface: #1c1c1c;
        --border: #2a2a2a;
        --text: #f0f0f0;
        --muted: #888888;
      }

      html, body {
        height: 100%;
        font-family: 'Poppins', system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 24px;
        text-align: center;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 40px 32px;
        max-width: 420px;
        width: 100%;
      }

      .logo {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 32px;
      }

      .logo-badge {
        background: var(--red);
        color: #fff;
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.08em;
        padding: 5px 10px;
        border-radius: 6px;
        text-transform: uppercase;
      }

      .logo-text {
        font-size: 16px;
        font-weight: 700;
        color: var(--text);
        letter-spacing: 0.02em;
      }

      .icon-wrapper {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 72px;
        height: 72px;
        border-radius: 50%;
        background: rgba(227, 6, 19, 0.12);
        margin: 0 auto 24px;
      }

      .icon-wrapper svg {
        color: var(--red);
      }

      h1 {
        font-size: 22px;
        font-weight: 700;
        color: var(--text);
        margin-bottom: 12px;
      }

      p {
        font-size: 14px;
        color: var(--muted);
        line-height: 1.6;
        margin-bottom: 32px;
      }

      .btn-retry {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: var(--red);
        color: #fff;
        border: none;
        border-radius: 10px;
        padding: 12px 28px;
        font-family: 'Poppins', sans-serif;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        transition: background 0.2s ease, transform 0.1s ease;
        text-decoration: none;
      }

      .btn-retry:hover {
        background: var(--red-dark);
      }

      .btn-retry:active {
        transform: scale(0.97);
      }

      .footer {
        margin-top: 24px;
        font-size: 11px;
        color: var(--border);
      }

      @media (max-width: 480px) {
        .card {
          padding: 32px 20px;
        }
        h1 { font-size: 19px; }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">
        <span class="logo-badge">UPTECH</span>
        <span class="logo-text">Campus</span>
      </div>

      <div class="icon-wrapper">
        <!-- Wifi-off SVG icon (inline) -->
        <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="1" y1="1" x2="23" y2="23"/>
          <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
          <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
          <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
          <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
          <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
          <circle cx="12" cy="20" r="1" fill="currentColor"/>
        </svg>
      </div>

      <h1>Vous êtes hors-ligne</h1>
      <p>Reconnectez-vous à Internet pour accéder à la plateforme.</p>

      <button class="btn-retry" onclick="window.location.reload()">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
        Réessayer
      </button>
    </div>

    <div class="footer">UPTECH Campus &copy; 2025</div>
  </body>
</html>
