<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 218 64">
  <!-- Carré rouge arrondi (bordure) -->
  <rect x="2" y="2" width="58" height="58" rx="9" ry="9" fill="none" stroke="#E30613" stroke-width="4.5"/>

  <!-- Quadrant TL : ROUGE -->
  <path d="M31,31 L9,31 A22,22 0 0,0 31,9 Z" fill="#E30613"/>

  <!-- Quadrant TR : NOIR -->
  <path d="M31,31 L31,9 A22,22 0 0,1 53,31 Z" fill="#111111"/>

  <!-- Quadrant BR : ROUGE -->
  <path d="M31,31 L53,31 A22,22 0 0,1 31,53 Z" fill="#E30613"/>

  <!-- Quadrant BL : NOIR -->
  <path d="M31,31 L31,53 A22,22 0 0,1 9,31 Z" fill="#111111"/>

  <!-- Arc blanc dans le quadrant BL (évidement) -->
  <path d="M31,31 L31,42.5 A11.5,11.5 0 0,1 19.5,31 Z" fill="#ffffff"/>

  <!-- Croix blanche clippée au cercle -->
  <clipPath id="cc">
    <circle cx="31" cy="31" r="22"/>
  </clipPath>
  <line x1="9" y1="31" x2="53" y2="31" stroke="#ffffff" stroke-width="2.5" clip-path="url(#cc)"/>
  <line x1="31" y1="9" x2="31" y2="53" stroke="#ffffff" stroke-width="2.5" clip-path="url(#cc)"/>

  <!-- Texte UP'TECH -->
  <text x="70" y="44" font-family="Arial,Helvetica,sans-serif" font-weight="bold" font-size="36" fill="#111111">UP'TECH</text>

  <!-- Ligne rouge dessous -->
  <rect x="2" y="60" width="214" height="4" fill="#E30613"/>
</svg>
